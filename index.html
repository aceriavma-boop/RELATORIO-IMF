<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte Horno IMF - Siderurgia</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --blue-dark: #0d123d; --blue-main: #1a237e; --blue-light: #2962ff; --gray-bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--gray-bg); margin: 0; padding: 10px; line-height: 1.4; }
        .container { max-width: 480px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); overflow: hidden; padding-bottom: 35px; transition: all 0.3s ease; }
        .header { background: var(--blue-dark); color: white; padding: 18px 15px; text-align: center; }
        .header h2 { margin: 0; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1.5px; }
        .section-title { background: #e8eaf6; padding: 8px 12px; font-weight: bold; color: var(--blue-main); font-size: 11px; text-transform: uppercase; border-left: 5px solid var(--blue-light); margin: 18px 0 12px 0; }
        .form-content { padding: 12px 18px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 10px; }
        .quad-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
        .triple-row { display: grid; grid-template-columns: 1fr 1fr 1.2fr; gap: 10px; margin-bottom: 10px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #444; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; font-size: 15px; background-color: #fff; height: 45px; }
        .chem-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .chem-item { text-align: center; background: #fdfdfd; padding: 8px; border: 1px solid #eee; border-radius: 8px; }
        .chem-item label { color: var(--blue-light); font-size: 11px; }
        .chem-item input { border: none; background: transparent; text-align: center; font-weight: bold; font-size: 16px; border-bottom: 2px solid #ddd; width: 90%; height: auto; border-radius: 0; }
        .btn-container { padding: 20px; text-align: center; max-width: 480px; margin: auto; }
        .btn-submit { background: var(--blue-light); color: white; border: none; padding: 18px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
    </style>
</head>
<body>

<div id="reporteArea" class="container">
    <div class="header">
        <h2 style="margin:0">📊 CONTROL DE FUNDICIÓN</h2>
        <div style="font-size: 10px; opacity: 0.8; margin-top: 5px;">REPORTE TÉCNICO - HORNO IMF</div>
    </div>

    <div class="form-content">
        <div class="row">
            <div><label>Fecha</label><input type="date" id="fecha"></div>
            <div><label>Hora de Colada</label><input type="time" id="horario"></div>
        </div>
        <div class="row">
            <div>
                <label>Turno</label>
                <select id="turno">
                    <option>1º Turno</option>
                    <option>2º Turno</option>
                    <option>3º Turno</option>
                </select>
            </div>
            <div><label>Supervisor</label><input type="text" id="supervisor" placeholder="Nombre"></div>
        </div>

        <div class="section-title">Carga Actual en Hornos (%)</div>
        <div class="quad-row">
            <div><label>H-A</label><input type="number" id="hA" placeholder="%"></div>
            <div><label>H-B</label><input type="number" id="hB" placeholder="%"></div>
            <div><label>H-C</label><input type="number" id="hC" placeholder="%"></div>
            <div><label>H-D</label><input type="number" id="hD" placeholder="%"></div>
        </div>

        <div class="section-title">Datos de la Colada</div>
        <div class="triple-row">
            <div><label>Secuencia Día</label>
                <select id="numSecuencia">
                    <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option>
                </select>
            </div>
            <div><label>Colada Sec.</label>
                <select id="coladaEnSecuencia">
                    <option>1ª</option><option>2ª</option><option>3ª</option><option>4ª</option><option>5ª</option><option>6ª</option><option>7ª</option><option>8ª</option><option>9ª</option><option>10ª</option><option>11ª</option><option>12ª</option>
                </select>
            </div>
            <div><label>ID Colada</label><input type="text" id="idColada" placeholder="501"></div>
        </div>

        <div class="section-title">Operacional</div>
        <div class="row">
            <div><label>Temp. Vaciado (°C)</label><input type="number" id="temp"></div>
            <div><label>Cant. Cargada (T)</label><input type="number" id="cantCargada"></div>
        </div>
        <div class="row">
            <div><label>Vida Refractario</label><input type="number" id="vidaRef"></div>
            <div><label>Limpieza Boca</label><select id="limpiezaBoca"><option>Sim</option><option>Não</option></select></div>
        </div>
        <div class="triple-row">
            <div><label>Tap to Tap</label><input type="text" id="tapToTap" placeholder="min"></div>
            <div><label>Power On</label><input type="text" id="powerOn" placeholder="min"></div>
            <div><label>Power Off</label><input type="text" id="powerOff" placeholder="min"></div>
        </div>

        <div class="section-title">Energía</div>
        <div class="row">
            <div><label>Potencia (KW)</label><input type="number" id="potencia"></div>
            <div><label>Consumo (KWH/T)</label><input type="number" id="consumo"></div>
        </div>

        <div class="section-title">Composición Química (%)</div>
        <div class="chem-grid">
            <div class="chem-item"><label>C %</label><input type="text" id="c" value="0.00"></div>
            <div class="chem-item"><label>Si %</label><input type="text" id="si" value="0.00"></div>
            <div class="chem-item"><label>Mn %</label><input type="text" id="mn" value="0.00"></div>
            <div class="chem-item"><label>Cu %</label><input type="text" id="cu" value="0.00"></div>
            <div class="chem-item"><label>Zn %</label><input type="text" id="zn" value="0.00"></div>
            <div class="chem-item"><label>Pb %</label><input type="text" id="pb" value="0.00"></div>
        </div>
    </div>
</div>

<div class="btn-container">
    <button class="btn-submit" onclick="registrarYGenerar()">GENERAR Y GUARDAR REPORTE</button>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwxNOAo0RnH2FsWUejC_ILS5Ec6S4gT-XIs-aCiiXzZZqGcQF6HciCW55zjdpQmGkrT/exec';

    window.onload = () => { document.getElementById('fecha').valueAsDate = new Date(); };

    async function registrarYGenerar() {
        const btn = document.querySelector('.btn-submit');
        const area = document.getElementById('reporteArea');
        
        // Bloqueo visual (Efecto carga)
        btn.innerText = "PROCESANDO...";
        btn.disabled = true;
        btn.style.backgroundColor = "#666";
        area.style.filter = "grayscale(100%)";
        area.style.opacity = "0.5";
        document.body.style.cursor = "wait";

        const datos = {
            fecha: document.getElementById('fecha').value,
            hora: document.getElementById('horario').value,
            turno: document.getElementById('turno').value,
            supervisor: document.getElementById('supervisor').value,
            hA: document.getElementById('hA').value,
            hB: document.getElementById('hB').value,
            hC: document.getElementById('hC').value,
            hD: document.getElementById('hD').value,
            secDia: document.getElementById('numSecuencia').value,
            nColSec: document.getElementById('coladaEnSecuencia').value,
            idColada: document.getElementById('idColada').value,
            temp: document.getElementById('temp').value,
            cant: document.getElementById('cantCargada').value,
            vida: document.getElementById('vidaRef').value,
            limpieza: document.getElementById('limpiezaBoca').value,
            tap: document.getElementById('tapToTap').value,
            pOn: document.getElementById('powerOn').value,
            pOff: document.getElementById('powerOff').value,
            pot: document.getElementById('potencia').value,
            cons: document.getElementById('consumo').value,
            c: document.getElementById('c').value,
            si: document.getElementById('si').value,
            mn: document.getElementById('mn').value,
            cu: document.getElementById('cu').value,
            zn: document.getElementById('zn').value,
            pb: document.getElementById('pb').value
        };

        try {
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) });
        } catch (e) { console.error("Error al guardar"); }

        html2canvas(area, { 
            scale: 2, 
            backgroundColor: "#ffffff",
            onclone: (clonedDoc) => {
                const clonedArea = clonedDoc.getElementById('reporteArea');
                clonedArea.style.filter = "none";
                clonedArea.style.opacity = "1";
                clonedArea.style.paddingBottom = "50px";
            }
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `Reporte_${datos.idColada}_${datos.fecha}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();

            // Restaurar visuales
            area.style.filter = "none";
            area.style.opacity = "1";
            btn.innerText = "GENERAR Y GUARDAR REPORTE";
            btn.disabled = false;
            btn.style.backgroundColor = "#2962ff";
            document.body.style.cursor = "default";

            const msj = encodeURIComponent(`*REPORTE DE HORNO IMF*\n📅 *Fecha:* ${datos.fecha}\n✅ *Colada:* ${datos.idColada}\n✅ *Secuencia:* ${datos.secDia} (${datos.nColSec})\n\n_Imagen descargada. Selecciónala en WhatsApp._`);
            window.open(`https://wa.me/?text=${msj}`, '_blank');
        });
    }
</script>
</body>
</html>
